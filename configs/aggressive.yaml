# Aggressive Security Configuration for tel-os
# Maximum security settings for high-risk environments

model:
  name: "telos-governor-v2"
  version: "2.1.0"
  
security:
  rejection_threshold: 0.95
  vector_dimensionality: 1024
  max_query_length: 512
  timeout_seconds: 60
  strict_mode: true
  zero_tolerance_policy: true
  
performance:
  batch_size: 16
  cache_size: 500
  num_workers: 2
  
logging:
  level: "DEBUG"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_output: true
  max_file_size: "50MB"
  audit_trail: true
  
monitoring:
  metrics_enabled: true
  health_check_interval: 30
  alert_thresholds:
    error_rate: 0.005
    response_time: 2.0
    memory_usage: 0.7
    cpu_usage: 0.7
    
advanced_security:
  enable_deep_analysis: true
  multi_layer_validation: true
  behavioral_analytics: true
  anomaly_detection: true