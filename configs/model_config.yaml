# Aegis-HR Model Configuration

# Default model configuration
model:
  # Primary model: Gemma 2 9B (for Modal deployment)
  name: "google/gemma-2-9b-it"
  
  # Fallback models (in order of preference)
  fallbacks:
    - "google/gemma-2-9b"
    - "google/gemma-2b-it"
    - "meta-llama/Llama-3.1-8B-Instruct"
  
  # Device configuration
  device: "cuda"
  dtype: "bfloat16"
  
  # Loading options
  load_in_8bit: false
  load_in_4bit: false
  trust_remote_code: true

# SAE (Sparse Autoencoder) Configuration
sae:
  # SAE lens release version
  # For Gemma 2 9B: use the 9b release
  release: "gemma-scope-2b-pt-res-jh"
  
  # SAE type (JumpReLU for Gemma Scope)
  sae_type: "jump_relu"
  
  # Layer configuration
  # For Gemma 2 9B: 42 layers total
  # We typically steer at mid layers (18-24)
  default_steering_layer: 20
  default_capping_layer: 22
  
  # Feature cache settings
  cache_enabled: true
  cache_ttl: 3600  # seconds
  cache_max_size: 10000

# Inference Configuration
inference:
  # Generation parameters
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.9
  top_k: 50
  
  # Streaming
  stream: false
  
  # Batch size for calibration
  calibration_batch_size: 10

# Governance defaults
governance:
  # Default steering coefficient range
  steering_coefficient:
    min: -8.0
    max: -2.0
    default: -4.5
  
  # Capping threshold (percentile)
  capping_threshold: 25
  
  # Safety settings
  circuit_breaker_enabled: true
  max_interventions_per_request: 10
