# Benign Configuration for tel-os
# Relaxed settings for low-risk environments or testing

model:
  name: "telos-governor-v2"
  version: "2.1.0"
  
security:
  rejection_threshold: 0.6
  vector_dimensionality: 256
  max_query_length: 2048
  timeout_seconds: 15
  strict_mode: false
  
performance:
  batch_size: 64
  cache_size: 2000
  num_workers: 8
  
logging:
  level: "WARNING"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_output: false
  
monitoring:
  metrics_enabled: false
  health_check_interval: 120
  alert_thresholds:
    error_rate: 0.05
    response_time: 10.0
    memory_usage: 0.9
    
advanced_security:
  enable_deep_analysis: false
  multi_layer_validation: false
  behavioral_analytics: false
  anomaly_detection: false